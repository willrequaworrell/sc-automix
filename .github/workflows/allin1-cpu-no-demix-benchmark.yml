name: allin1 CPU no-demix benchmark

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  benchmark:
    name: Linux CPU no-demix
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      SPIKE_DIR: spikes/allin1-docker-cpu-no-demix
      IMAGE_NAME: ghcr.io/${{ github.repository }}/allin1-cpu-no-demix:latest
      TRACK_NAME: In-Search-Of-Sunset-126bpm-1000-Handz.mp3
      TRACK_STEM: In-Search-Of-Sunset-126bpm-1000-Handz
      EXPECTED_BPM: "130"
      BPM_TOLERANCE: "1"
      WARM_MAX_SECONDS: "180"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull benchmark image
        run: docker pull "$IMAGE_NAME"

      - name: Run cold benchmark
        run: |
          mkdir -p "$SPIKE_DIR/out/cold" "$SPIKE_DIR/cache"
          docker run --rm --platform linux/amd64 \
            --cpus=4 \
            -e CUDA_VISIBLE_DEVICES="" \
            -e XDG_CACHE_HOME=/cache/xdg \
            -e TORCH_HOME=/cache/torch \
            -e HF_HOME=/cache/huggingface \
            -e MPLCONFIGDIR=/cache/matplotlib \
            -v "$PWD/$SPIKE_DIR/fixtures:/input:ro" \
            -v "$PWD/$SPIKE_DIR/out/cold:/output" \
            -v "$PWD/$SPIKE_DIR/cache:/cache" \
            "$IMAGE_NAME" \
            "/input/$TRACK_NAME" \
            --output-dir /output \
            --cache-dir /cache/huggingface \
            --timings-path /output/timings.jsonl

      - name: Run warm benchmark
        run: |
          mkdir -p "$SPIKE_DIR/out/warm"
          docker run --rm --platform linux/amd64 \
            --cpus=4 \
            -e CUDA_VISIBLE_DEVICES="" \
            -e XDG_CACHE_HOME=/cache/xdg \
            -e TORCH_HOME=/cache/torch \
            -e HF_HOME=/cache/huggingface \
            -e MPLCONFIGDIR=/cache/matplotlib \
            -v "$PWD/$SPIKE_DIR/fixtures:/input:ro" \
            -v "$PWD/$SPIKE_DIR/out/warm:/output" \
            -v "$PWD/$SPIKE_DIR/cache:/cache" \
            "$IMAGE_NAME" \
            "/input/$TRACK_NAME" \
            --output-dir /output \
            --cache-dir /cache/huggingface \
            --timings-path /output/timings.jsonl

      - name: Validate output
        run: |
          python3 - <<'PY'
          import json
          import math
          import os
          import sys
          from pathlib import Path

          spike_dir = os.environ["SPIKE_DIR"]
          track_stem = os.environ["TRACK_STEM"]
          expected_bpm = float(os.environ["EXPECTED_BPM"])
          bpm_tolerance = float(os.environ["BPM_TOLERANCE"])
          warm_max_seconds = float(os.environ["WARM_MAX_SECONDS"])
          out_path = Path(spike_dir) / "out" / "warm" / f"{track_stem}.json"
          data = json.loads(out_path.read_text())

          required = [
            "track_id",
            "analysis_version",
            "engine",
            "duration_analyzed_sec",
            "beats",
            "downbeats",
            "bars",
            "warnings",
            "raw_summary",
          ]
          failures = [f"missing required field: {key}" for key in required if key not in data]

          tempo_bpm = float(data.get("tempo_bpm", "nan"))
          total_cli_sec = float(data.get("raw_summary", {}).get("timings_sec", {}).get("total_cli_sec", "nan"))
          beats = data.get("beats", [])
          downbeats = data.get("downbeats", [])
          bars = data.get("bars", [])
          segments = data.get("segments", [])

          if not math.isfinite(tempo_bpm) or abs(tempo_bpm - expected_bpm) > bpm_tolerance:
            failures.append(f"tempo_bpm {tempo_bpm} is outside {expected_bpm} +/- {bpm_tolerance}")
          if not math.isfinite(total_cli_sec) or total_cli_sec > warm_max_seconds:
            failures.append(f"warm total_cli_sec {total_cli_sec} exceeds {warm_max_seconds}")
          if not beats:
            failures.append("no beats emitted")
          if not downbeats:
            failures.append("no downbeats emitted")
          if not bars:
            failures.append("no bars emitted")

          summary = {
            "out_path": str(out_path),
            "analysis_version": data.get("analysis_version"),
            "tempo_bpm": tempo_bpm,
            "expected_bpm": expected_bpm,
            "total_cli_sec": total_cli_sec,
            "beats": len(beats),
            "downbeats": len(downbeats),
            "bars": len(bars),
            "segments": len(segments),
          }
          print(json.dumps(summary, indent=2, sort_keys=True))

          if failures:
            print("\n".join(failures), file=sys.stderr)
            sys.exit(1)
          PY

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allin1-cpu-no-demix-benchmark
          if-no-files-found: warn
          path: |
            ${{ env.SPIKE_DIR }}/out/**/*.json
            ${{ env.SPIKE_DIR }}/out/**/*.jsonl
