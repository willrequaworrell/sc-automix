name: publish allin1 CPU no-demix image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  SPIKE_DIR: spikes/allin1-docker-cpu-no-demix
  IMAGE_NAME: ghcr.io/${{ github.repository }}/allin1-cpu-no-demix

jobs:
  publish:
    name: Build and publish image
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.SPIKE_DIR }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha,scope=allin1-cpu-no-demix
          cache-to: type=gha,scope=allin1-cpu-no-demix,mode=max

